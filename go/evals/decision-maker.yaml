        label: "confidence for internal_slack_channel is 0"
        value: |
          const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
          const conf = d.extracted_confidence?.internal_slack_channel;
          return conf === undefined || conf?.score === 0;

  - description: "Name collision — Mercury disambiguated to planet via entity_context"
    vars:
      entity_context: '"the innermost planet orbiting the Sun"'
      entity: "Mercury"
      columns: "- orbital_period_days [type: number]\n- distance_from_sun_km [type: number]"
      search_results: |
        Position 1: Mercury - Wikipedia
        URL: https://en.wikipedia.org/wiki/Mercury
        Snippet: Mercury most commonly refers to: Mercury (planet), the innermost planet of the Solar System; Mercury (element), a chemical element with symbol Hg and atomic number 80; Mercury (mythology), a Roman deity; Mercury (automobile), a discontinued Ford brand.
        ---
        Position 2: Mercury (planet) - Wikipedia
        URL: https://en.wikipedia.org/wiki/Mercury_(planet)
        Snippet: Mercury is the first planet from the Sun and the smallest in the Solar System. It has an orbital period of 87.97 Earth days and a mean distance from the Sun of 57.91 million kilometres (0.387 AU).
        ---
        Position 3: Mercury (element) - Wikipedia
        URL: https://en.wikipedia.org/wiki/Mercury_(element)
        Snippet: Mercury is a chemical element with symbol Hg and atomic number 80. The only metal that is liquid at standard conditions for temperature and pressure. Boiling point 356.73 °C.
        ---
        Position 4: Mercury | Facts, Size, Distance from Sun - Britannica
        URL: https://www.britannica.com/place/Mercury-planet
        Snippet: Mercury, innermost planet of the solar system. Its mean distance from the Sun is 57.9 million km (36 million miles) and it has a period of revolution of 87.97 Earth days.
        ---
        Position 5: Mercury - NASA Solar System Exploration
        URL: https://science.nasa.gov/mercury/
        Snippet: Mercury is the smallest planet in our solar system and is closest to the Sun, completing one orbit approximately every 88 Earth days.
        ---
        Position 6: Mercury Technologies - Banking for Startups
        URL: https://mercury.com
        Snippet: Mercury is a financial technology company providing banking services to startups and small businesses. Founded 2019, headquartered in San Francisco.
        ---
        Position 7: Ford Mercury - Classic Cars
        URL: https://www.hemmings.com/ford-mercury
        Snippet: Mercury was a brand of automobiles sold by Ford Motor Company from 1938 until Ford discontinued it in 2011.
        ---
        Position 8: Mercury - Space.com
        URL: https://www.space.com/36-mercury-the-solar-systems-innermost-planet.html
        Snippet: Mercury has the shortest year of all the planets — just 87.97 Earth days. Its mean distance from the Sun is 0.387 AU (about 57.9 million km).
        ---
      people_also_ask: "Q: How long is a year on Mercury? A: A year on Mercury lasts approximately 87.97 Earth days. Q: How far is Mercury from the Sun? A: Mercury's average distance from the Sun is about 57.9 million kilometres (0.387 AU)."
      max_urls: "2"
    assert:
      - type: javascript
        label: "orbital_period_days is approximately 88 days (85–91)"
        value: |
          const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
          const op = d.extracted_data?.orbital_period_days;
          return typeof op === 'number' && op >= 85 && op <= 91;
      - type: javascript
        label: "distance_from_sun_km is in planetary range (55M–62M km)"
        value: |
          const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
          const dist = d.extracted_data?.distance_from_sun_km;
          return typeof dist === 'number' && dist >= 55000000 && dist <= 62000000;
      - type: llm-rubric
        label: "entity_context correctly steered disambiguation to the planet"
        value: |
          The entity_context explicitly identifies Mercury as the innermost planet. Evaluate:
          1. Disambiguation: the model extracted planetary data (orbital period ~87.97 days, distance ~57.9M km) — not element properties (atomic number, boiling point), not company data (founded year, headquarters), and not car brand data.
          2. Source quality: source_urls or urls_to_crawl should reference en.wikipedia.org/wiki/Mercury_(planet), britannica.com, or nasa.gov — not the element, fintech, or automobile pages.
          3. Confidence: both columns are stable scientific constants available in multiple authoritative snippets, so confidence scores should be ≥ 0.9.

  # ──────────────────────────────────────────────
  # Crawl memory — must not re-select previously crawled URLs
  # ──────────────────────────────────────────────
  - description: "Crawl memory — avoids previously crawled URLs"
    vars:
      entity_context: '"Vercel" (context: cloud platform for frontend frameworks)'
      entity: "Vercel"
      columns: "- employee_count [type: number]\n- annual_revenue_usd [type: number]"
      previously_crawled_urls: |
        - https://en.wikipedia.org/wiki/Vercel
        - https://www.crunchbase.com/organization/vercel
      search_results: |
        Position 1: Vercel - Wikipedia
        URL: https://en.wikipedia.org/wiki/Vercel
        Snippet: Vercel Inc. is an American cloud computing company. The company maintains the Next.js web development framework. Vercel has approximately 600 employees.
        ---
        Position 2: Vercel - Crunchbase Company Profile & Funding
        URL: https://www.crunchbase.com/organization/vercel
        Snippet: Vercel has 600 employees and has raised $563M in funding. Last funding round was Series D in 2022 at $2.5B valuation.
        ---
        Position 3: Vercel 2026 Company Profile - PitchBook
        URL: https://pitchbook.com/profiles/company/vercel-234567
        Snippet: Vercel company profile including valuation, funding, revenue estimates. Estimated annual revenue: $200M+.
        ---
        Position 4: Vercel | Company Overview & News - Forbes
        URL: https://www.forbes.com/companies/vercel/
        Date: Jan 15, 2026
        Snippet: Vercel is a cloud platform for frontend frameworks and static sites. Employees: ~600.
        ---
        Position 5: Vercel - LinkedIn
        URL: https://www.linkedin.com/company/vercel
        Snippet: Vercel is a platform for frontend developers, providing the speed and reliability innovators need to create at the moment of inspiration.
        ---
      people_also_ask: ""
      max_urls: "3"
    assert:
      - type: javascript
        label: "urls_to_crawl does NOT contain previously crawled Wikipedia URL"
        value: |
          const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
          return !d.urls_to_crawl.includes('https://en.wikipedia.org/wiki/Vercel');
      - type: javascript
        label: "urls_to_crawl does NOT contain previously crawled Crunchbase URL"
        value: |
          const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
          return !d.urls_to_crawl.includes('https://www.crunchbase.com/organization/vercel');
      - type: javascript
        label: "urls_to_crawl contains only fresh (non-crawled) URLs"
        value: |
          const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
          const blocklist = ['https://en.wikipedia.org/wiki/Vercel', 'https://www.crunchbase.com/organization/vercel'];
          return d.urls_to_crawl.every(u => !blocklist.includes(u));

  # ──────────────────────────────────────────────
  # Partial match — department email should not satisfy general contact_email
  # ──────────────────────────────────────────────
  - description: "Partial match — department email rejected for contact_email"
    vars:
      entity_context: '"Vercel" (context: cloud platform company)'
      entity: "Vercel"
      columns: "- contact_email [type: string]\n- headquarters [type: string]"
      search_results: |
        Position 1: Vercel Privacy Policy
        URL: https://vercel.com/legal/privacy-policy
        Snippet: For privacy inquiries, contact privacy@vercel.com. Vercel Inc., 340 S Lemon Ave #4133, Walnut, CA 91789.
        ---
        Position 2: Vercel Security
        URL: https://vercel.com/security
        Snippet: Report security vulnerabilities to security@vercel.com. We take security seriously.
        ---
        Position 3: Vercel - Contact Us
        URL: https://vercel.com/contact
        Snippet: Get in touch with the Vercel team. For sales inquiries, enterprise plans, and partnerships.
        ---
        Position 4: Vercel Support
        URL: https://vercel.com/help
        Snippet: Get help with your Vercel account. Submit a support ticket or browse our documentation.
        ---
        Position 5: Vercel - Wikipedia
        URL: https://en.wikipedia.org/wiki/Vercel
        Snippet: Vercel Inc. is headquartered in San Francisco, California. The company was founded by Guillermo Rauch in 2015.
        ---
      people_also_ask: ""
      max_urls: "3"
    assert:
      - type: javascript
        label: "contact_email is NOT privacy@ or security@ (or is null)"
        value: |
          const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
          const email = d.extracted_data?.contact_email;
          if (email === null || email === undefined) return true;
          const lower = email.toLowerCase();
          return !lower.startsWith('privacy@') && !lower.startsWith('security@');
      - type: javascript
        label: "if contact_email is a dept email, confidence is ≤ 0.4"
        value: |
          const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
          const email = d.extracted_data?.contact_email;
          if (email === null || email === undefined) return true;
          const lower = email.toLowerCase();
          const isDept = lower.startsWith('privacy@') || lower.startsWith('security@') || lower.startsWith('legal@') || lower.startsWith('billing@');
          if (!isDept) return true;
          const conf = d.extracted_confidence?.contact_email;
          return conf && conf.score <= 0.4;
      - type: javascript
        label: "headquarters mentions San Francisco or Walnut CA"
        value: |
          const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
          const hq = d.extracted_data?.headquarters;
          if (hq === null || hq === undefined) return false;
          const lower = hq.toLowerCase();
          return lower.includes('san francisco') || lower.includes('walnut');
      - type: javascript
        label: "urls_to_crawl includes contact page for missing email"
        value: |
          const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
          const email = d.extracted_data?.contact_email;
          if (email !== null && email !== undefined) return true;
          return d.urls_to_crawl.some(u => u.includes('vercel.com/contact'));
