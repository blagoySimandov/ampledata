# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Decision maker — v1 vs v2 on Gemini 2.5 Flash"

prompts:
  # - id: file://prompts/decision-maker-v2-clear.txt
  #   label: v1-verbose
  - id: file://../internal/services/prompts/decision-maker.txt
    label: v2-production

providers:
  - id: google:gemini-2.5-flash
  - id: google:gemini-3-flash-preview

defaultTest:
  options:
    provider: openai:gpt-5.4
  vars:
    current_date: "2026-03-20"
    previously_crawled_urls: "None"
  assert:
    - type: javascript
      label: "valid JSON (with or without markdown fences)"
      value: |
        const stripped = output.replace(/^```(?:json)?\s*/,'').replace(/```\s*$/,'');
        try { JSON.parse(stripped); return true; } catch { return false; }
    - type: javascript
      label: "urls_to_crawl is an array"
      value: |
        const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
        return Array.isArray(d.urls_to_crawl);
    - type: javascript
      label: "no extra top-level keys"
      value: |
        const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
        const allowed = new Set(['urls_to_crawl','extracted_data','extracted_confidence','source_urls','reasoning']);
        return Object.keys(d).every(k => allowed.has(k));

