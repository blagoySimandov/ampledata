        label: "does not confuse company revenue with personal net worth"
        value: |
          const d = JSON.parse(output.replace(/^```(?:json)?\s*/, "").replace(/```\s*$/, ""));
          const nw = d.extracted_data?.net_worth_usd;
          return nw !== 25180000000 && nw !== 25000000000;
      - type: llm-rubric
        label: "entity disambiguation quality"
        value: |
          The extracted data is about Elon Musk the person. Evaluate three things:
          1. Correctness: net_worth_usd either reflects his personal fortune (~$852B as of Feb 2026 per Forbes) or is omitted in favour of crawling — not a company revenue figure.
